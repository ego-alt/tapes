<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Tapes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/primitives.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/player.css') }}">
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h1><span class="accent">▰▰</span> TAPES</h1>
        <button class="btn btn-ghost" id="dlToggle" title="Download a track">⬇</button>
      </div>

      <div class="dl-panel" id="dlPanel" hidden>
        <form class="dl-form" id="dlForm">
          <input class="input" id="dlUrl" type="url" placeholder="Paste a URL to rip…" autocomplete="off">
          <button class="btn btn-primary" type="submit">Get</button>
        </form>
        <ul class="dl-list" id="dlList"></ul>
      </div>

      <!-- shelf of tapes -->
      <div class="shelf" id="shelfView">
        <ul class="shelf-list" id="shelfList"></ul>
        <form class="new-tape" id="newTapeForm">
          <input class="input" id="newTapeName" placeholder="New tape…" autocomplete="off">
          <button class="btn btn-secondary" type="submit" title="Create tape">+</button>
        </form>
      </div>

      <!-- tracks within a tape -->
      <div class="tracks-view" id="tracksView" hidden>
        <button class="btn btn-ghost back-btn" id="backBtn">‹ Tapes</button>
        <div class="tape-title" id="tapeTitle"></div>
        <div class="search-wrap">
          <input class="input" id="search" type="search" placeholder="Search…" autocomplete="off">
        </div>
        <ul class="track-list" id="trackList"></ul>
      </div>
    </aside>

    <main class="main">
      <button class="btn btn-ghost nav-toggle" id="navToggle" title="Toggle navigator">☰</button>

      <div class="deck">
        <div class="cassette" id="cassette">
          <svg class="cassette-svg" viewBox="0 0 330 206" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <defs>
              <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#e2ddd2"/>
                <stop offset="0.5" stop-color="#cfc9bc"/>
                <stop offset="1" stop-color="#b7b0a2"/>
              </linearGradient>
              <radialGradient id="screw" cx="0.4" cy="0.35" r="0.75">
                <stop offset="0" stop-color="#5a544c"/>
                <stop offset="1" stop-color="#13110f"/>
              </radialGradient>
              <radialGradient id="drive" cx="0.4" cy="0.35" r="0.8">
                <stop offset="0" stop-color="#d7a85f"/>
                <stop offset="1" stop-color="#8a6224"/>
              </radialGradient>
              <pattern id="tex" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-opacity="0.05" stroke-width="1"/>
              </pattern>
            </defs>

            <rect x="5" y="5" width="320" height="196" rx="16" fill="url(#shell)" stroke="#8f897c" stroke-width="1"/>
            <rect x="5" y="5" width="320" height="196" rx="16" fill="url(#tex)"/>
            <rect x="13" y="13" width="304" height="180" rx="11" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
            <rect x="118" y="9" width="42" height="9" rx="2" fill="#ffffff" opacity="0.45"/>
            <rect x="170" y="9" width="42" height="9" rx="2" fill="#ffffff" opacity="0.45"/>

            <rect class="band" x="13" y="80" width="304" height="64"/>
            <line x1="13" y1="80" x2="317" y2="80" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
            <line x1="13" y1="144" x2="317" y2="144" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>

            <rect class="reel-window" x="40" y="86" width="250" height="52" rx="6"/>
            <rect class="tape-view" x="140" y="96" width="50" height="32" rx="4"/>
            <path class="tape-line" d="M118 112 q47 -10 94 0"/>
            <circle class="roller" cx="165" cy="112" r="3.5"/>

            <g class="reel reel-left">
              <circle class="tape-pack" cx="98" cy="112" r="24"/>
              <circle class="teeth" cx="98" cy="112" r="14"/>
              <circle class="hub" cx="98" cy="112" r="10"/>
              <circle class="hub-center" cx="98" cy="112" r="3"/>
            </g>
            <g class="reel reel-right">
              <circle class="tape-pack" cx="232" cy="112" r="24"/>
              <circle class="teeth" cx="232" cy="112" r="14"/>
              <circle class="hub" cx="232" cy="112" r="10"/>
              <circle class="hub-center" cx="232" cy="112" r="3"/>
            </g>

            <path class="band-arrow" d="M300 109 h13 v-3 l6 4.5 -6 4.5 v-3 h-13 z"/>

            <circle cx="72" cy="168" r="15" fill="url(#drive)" opacity="0.85"/>
            <circle cx="72" cy="168" r="6" fill="#3a2a12"/>
            <circle cx="258" cy="168" r="15" fill="url(#drive)" opacity="0.85"/>
            <circle cx="258" cy="168" r="6" fill="#3a2a12"/>
            <rect class="cutout" x="126" y="152" width="78" height="22" rx="3"/>
            <circle cx="150" cy="180" r="3.5" fill="#14110e"/>
            <circle cx="180" cy="180" r="3.5" fill="#14110e"/>
            <circle cx="110" cy="186" r="2.6" fill="rgba(0,0,0,0.4)"/>
            <circle cx="220" cy="186" r="2.6" fill="rgba(0,0,0,0.4)"/>
            <rect x="156" y="184" width="18" height="6" rx="2" fill="rgba(0,0,0,0.35)"/>

            <circle cx="20"  cy="20"  r="5"   fill="url(#screw)"/>
            <circle cx="310" cy="20"  r="5"   fill="url(#screw)"/>
            <circle cx="20"  cy="186" r="5"   fill="url(#screw)"/>
            <circle cx="310" cy="186" r="5"   fill="url(#screw)"/>
            <circle cx="165" cy="190" r="3.6" fill="url(#screw)"/>
          </svg>

          <div class="cassette-label" id="label">
            <span class="label-index">INDEX</span>
            <img class="label-art" id="labelArt" alt="">
            <div class="label-write">
              <div class="label-title" id="labelTitle">insert a tape</div>
              <div class="label-artist" id="labelArtist"></div>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="scrub" id="scrub"><div class="scrub-fill" id="scrubFill"></div></div>
          <div class="times"><span id="curTime">0:00</span><span id="durTime">0:00</span></div>
          <div class="transport">
            <button class="tbtn" id="prevBtn" title="Previous">⏮</button>
            <button class="tbtn play" id="playBtn" title="Play/Pause">▶</button>
            <button class="tbtn" id="nextBtn" title="Next">⏭</button>
            <button class="tbtn fav" id="favBtn" title="Favorite">♡</button>
          </div>
        </div>
      </div>

      <audio id="audio" preload="metadata"></audio>
    </main>
  </div>

  <div class="menu" id="plMenu" hidden></div>

  <script>
    window.MUSIC = {
      streamBase: "{{ url_for('stream.stream', track_id=0) }}".slice(0, -1),
      coverBase: "{{ url_for('stream.cover', track_id=0) }}".slice(0, -1),
    };
  </script>
  <script src="{{ url_for('static', filename='js/player.js') }}"></script>
</body>
</html>
